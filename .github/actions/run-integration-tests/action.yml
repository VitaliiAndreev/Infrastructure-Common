name: Run integration tests
description: >
  Runs integration tests in Docker containers by calling
  Run-IntegrationTests.ps1 from Infrastructure-Common. Tests run under
  PowerShell 7 only - the mcr.microsoft.com/powershell image is Linux-based
  and PowerShell 5.1 has no Docker image.

runs:
  using: composite
  steps:
    - name: Run integration tests
      shell: pwsh
      # ${{ github.action_path }} is the directory where the runner downloaded
      # this action's files - three levels up is the Infrastructure-Common repo
      # root where Run-IntegrationTests.ps1 lives.
      run: |
        $script = [IO.Path]::GetFullPath(
            (Join-Path '${{ github.action_path }}' '..' '..' '..' 'Run-IntegrationTests.ps1'))
        & $script -TestsRoot '${{ github.workspace }}'
