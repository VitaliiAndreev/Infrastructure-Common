name: Publish to PSGallery

# Reusable workflow - called from tag.yml after the tag is created.
on:
  workflow_call:
    inputs:
      module-path:
        description: >
          Relative path to the module folder inside the caller's repository
          (e.g. 'Infrastructure.Common').
        required: true
        type: string
    secrets:
      PSGALLERY_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      module-path:
        description: >
          Relative path to the module folder
          (e.g. 'Infrastructure.Common').
        required: true
        type: string

jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/assert-secret
        with:
          value: ${{ secrets.PSGALLERY_API_KEY }}
          name: PSGALLERY_API_KEY

      - uses: ./.github/actions/publish
        with:
          module-path: ${{ inputs.module-path }}
          api-key: ${{ secrets.PSGALLERY_API_KEY }}
