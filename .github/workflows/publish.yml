name: Publish to PSGallery

# Reusable workflow - called from tag.yml after the tag is created.
on:
  workflow_call:
    inputs:
      module-path:
        description: >
          Relative path to the module folder inside the caller's repository
          (e.g. 'Infrastructure.Common').
        required: true
        type: string
    secrets:
      PSGALLERY_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      module-path:
        description: >
          Relative path to the module folder
          (e.g. 'Infrastructure.Common').
        required: true
        type: string

jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # When running in Infrastructure-Common, use local action references so
      # that changes on the current branch take effect without needing to merge
      # to master first. External callers must use the pinned master reference
      # since their checkout does not contain these actions.
      - uses: ./.github/actions/assert-secret
        if: github.repository == 'VitaliiAndreev/Infrastructure-Common'
        with:
          value: ${{ secrets.PSGALLERY_API_KEY }}
          name: PSGALLERY_API_KEY

      - uses: VitaliiAndreev/Infrastructure-Common/.github/actions/assert-secret@master
        if: github.repository != 'VitaliiAndreev/Infrastructure-Common'
        with:
          value: ${{ secrets.PSGALLERY_API_KEY }}
          name: PSGALLERY_API_KEY

      - uses: ./.github/actions/publish
        if: github.repository == 'VitaliiAndreev/Infrastructure-Common'
        with:
          module-path: ${{ inputs.module-path }}
          api-key: ${{ secrets.PSGALLERY_API_KEY }}

      - uses: VitaliiAndreev/Infrastructure-Common/.github/actions/publish@master
        if: github.repository != 'VitaliiAndreev/Infrastructure-Common'
        with:
          module-path: ${{ inputs.module-path }}
          api-key: ${{ secrets.PSGALLERY_API_KEY }}
