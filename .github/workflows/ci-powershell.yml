name: CI

# Reusable unit-test workflow for PowerShell repos. Delegates to the
# run-unit-tests composite action, which calls Run-Tests.ps1 from
# Infrastructure-Common and excludes Tests\Integration\ automatically.
# Integration tests run separately via ci-powershell-docker.yml.
#
# Consumer repos call this workflow from their own ci.yml instead of
# maintaining their own run-tests logic for CI.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  ci-ps51:
    name: Unit (PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Local reference - GitHub resolves this against the current repo (and
      # current commit when triggered by a PR). Consumer repos calling this
      # workflow via workflow_call also resolve against Infrastructure-Common
      # since that is where the workflow file lives.
      - uses: ./.github/actions/run-unit-tests
        with:
          shell: powershell

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ps51
          path: TestResults.xml

  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/run-unit-tests
        with:
          shell: pwsh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ps7
          path: TestResults.xml
