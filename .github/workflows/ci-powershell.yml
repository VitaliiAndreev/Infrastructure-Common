name: CI

# Reusable unit-test workflow for PowerShell repos. Checks out
# Infrastructure-Common and calls Run-Tests.ps1 directly, excluding
# Tests\Integration\ automatically. Integration tests run separately via
# ci-powershell-docker.yml.
#
# Consumer repos call this workflow from their own ci.yml instead of
# maintaining their own run-tests logic for CI.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  ci-ps51:
    name: Unit (PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Check out Infrastructure-Common to access the shared run-tests script.
      # When running on an Infrastructure-Common PR, use the PR commit so
      # changes to the script are tested against themselves. Consumer repos
      # always get master.
      - uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/Infrastructure-Common
          ref: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' && github.sha || 'master' }}
          path: .ci-common

      - name: Run unit tests
        shell: powershell
        run: |
          .ci-common/.github/actions/run-unit-tests/Run-Tests.ps1 `
            -TestsRoot '${{ github.workspace }}'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ps51
          path: TestResults.xml

  ci-ps7:
    name: Unit (PowerShell 7)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/Infrastructure-Common
          ref: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' && github.sha || 'master' }}
          path: .ci-common

      - name: Run unit tests
        shell: pwsh
        run: |
          .ci-common/.github/actions/run-unit-tests/Run-Tests.ps1 `
            -TestsRoot '${{ github.workspace }}'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ps7
          path: TestResults.xml
