name: Tag from manifest version

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.Common/Infrastructure.Common.psd1'
  workflow_dispatch:

jobs:
  check:
    runs-on: windows-latest
    outputs:
      version_is_new: ${{ steps.check.outputs.version_is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        shell: pwsh
        run: |
          $version = (Import-PowerShellDataFile 'Infrastructure.Common\Infrastructure.Common.psd1').ModuleVersion
          $isNew = -not (git tag -l $version)
          "version_is_new=$($isNew.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          Write-Host $(if ($isNew) { "Version $version is new - proceeding." } else { "Version $version already tagged - skipping." })

  test:
    needs: check
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-powershell.yml

  test-integration:
    needs: check
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-powershell-docker.yml

  tag:
    needs: [ check, test, test-integration ]
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.version_is_new == 'true'
    runs-on: windows-latest
    permissions:
      # Required to create and push the tag.
      contents: write
    outputs:
      tag_created: ${{ steps.tag.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history is required so `git tag -l` can see all existing
          # tags and avoid creating duplicates.
          fetch-depth: 0

      - id: tag
        uses: ./.github/actions/tag-from-manifest
        with:
          psd1: 'Infrastructure.Common\Infrastructure.Common.psd1'

  publish:
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      module-path: Infrastructure.Common
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
