name: Tag from manifest version

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.Common/Infrastructure.Common.psd1'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci-powershell.yml

  test-integration:
    uses: ./.github/workflows/ci-powershell-docker.yml

  tag:
    needs: [ test, test-integration ]
    runs-on: windows-latest
    permissions:
      # Required to create and push the tag.
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history is required so `git tag -l` can see all existing
          # tags and avoid creating duplicates.
          fetch-depth: 0

      - uses: ./.github/actions/tag-from-manifest
        with:
          psd1: 'Infrastructure.Common\Infrastructure.Common.psd1'

  publish:
    needs: tag
    uses: ./.github/workflows/publish.yml
    with:
      module-path: Infrastructure.Common
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
