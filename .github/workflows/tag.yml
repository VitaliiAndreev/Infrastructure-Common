name: Tag from manifest version

# Reusable workflow shared by all Infrastructure-* module repos.
# Creates a git tag for the manifest version and exposes tag_created so
# callers can gate downstream jobs (e.g. publish) on whether a new tag
# was actually pushed.
# Callers are responsible for the version check and tests before invoking
# this workflow - see release.yml for the expected call pattern.
#
# The tag-from-manifest action is referenced conditionally so that changes
# on a feature branch in Infrastructure-Common are tested against the local
# versions rather than the published master.

on:
  workflow_call:
    inputs:
      psd1:
        description: >
          Path to the .psd1 manifest relative to the repo root
          (e.g. Infrastructure.Common\Infrastructure.Common.psd1).
        required: true
        type: string
    outputs:
      tag_created:
        description: "'true' if a new tag was created, 'false' otherwise."
        value: ${{ jobs.run.outputs.tag_created }}

jobs:
  run:
    runs-on: windows-latest
    outputs:
      tag_created: ${{ steps.tag-local.outputs.tag_created || steps.tag-external.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: tag-local
        if: github.repository == 'VitaliiAndreev/Infrastructure-Common'
        uses: ./.github/actions/tag-from-manifest
        with:
          psd1: ${{ inputs.psd1 }}

      - id: tag-external
        if: github.repository != 'VitaliiAndreev/Infrastructure-Common'
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/tag-from-manifest@master
        with:
          psd1: ${{ inputs.psd1 }}
