name: CI

# Reusable workflow that runs integration tests via the run-integration-tests
# composite action, which calls Run-IntegrationTests.ps1 from
# Infrastructure-Common. Each test file runs in its own
# mcr.microsoft.com/powershell container, matching local Docker runs exactly.
#
# If Tests/Integration/ does not exist or contains no test files the script
# exits cleanly with no failure.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  integration:
    name: Integration (PowerShell 7)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Local reference - resolves to the current commit in Infrastructure-Common
      # for both direct PRs and consumer repos calling via workflow_call.
      - uses: ./.github/actions/run-integration-tests
