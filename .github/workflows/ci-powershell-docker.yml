name: CI (Integration)

# Reusable workflow that runs integration tests via Run-IntegrationTests.ps1
# from Infrastructure-Common. Each test file runs in its own
# mcr.microsoft.com/powershell container, matching local Docker runs exactly.
#
# If Tests/Integration/ does not exist or contains no test files the script
# exits cleanly with no failure.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Check out the shared CI scripts. When running inside Infrastructure-Common
      # itself, use the current commit so PR changes to the script are tested.
      # When called from a consumer repo, use master.
      - name: Checkout Infrastructure-Common (shared CI scripts)
        uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/Infrastructure-Common
          ref: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' && github.sha || 'master' }}
          path: .ci-common

      - name: Run integration tests
        shell: pwsh
        run: ./.ci-common/Run-IntegrationTests.ps1 -TestsRoot '${{ github.workspace }}'
