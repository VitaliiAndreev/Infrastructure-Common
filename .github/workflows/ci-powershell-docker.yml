name: CI (Docker)

# Reusable workflow that runs integration tests. Checks out
# Infrastructure-Common and calls Run-IntegrationTests.ps1 directly. Each
# test file runs in its own mcr.microsoft.com/powershell container, matching
# local Docker runs exactly.
#
# Consumer repos call this workflow from their own ci-docker.yml instead of
# maintaining their own run-integration-tests logic for CI.
#
# If Tests/Integration/ does not exist or contains no test files the script
# exits cleanly with no failure.

on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (PowerShell 7)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Check out Infrastructure-Common to access the shared run-integration-tests
      # script. When running on an Infrastructure-Common PR, use the PR commit so
      # changes to the script are tested against themselves. Consumer repos
      # always get master.
      - uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/Infrastructure-Common
          ref: ${{ github.repository == 'VitaliiAndreev/Infrastructure-Common' && github.sha || 'master' }}
          path: .ci-common

      - name: Run integration tests
        shell: pwsh
        run: |
          .ci-common/.github/actions/run-integration-tests/Run-IntegrationTests.ps1 `
            -TestsRoot '${{ github.workspace }}'
